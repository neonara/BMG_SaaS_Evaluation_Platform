# ============================================================
# BMG Vitrine Website — CI/CD Pipeline
# Separate repo: frontend/vitrine
# Deploy target: Vercel (auto on push to main)
# ============================================================

name: Vitrine CI/CD

on:
  push:
    branches: [main, dev]
    paths:
      - "frontend/vitrine/**"
      - ".github/workflows/vitrine.yml"
  pull_request:
    branches: [main, dev]
  workflow_dispatch:

env:
  NODE_VERSION: "20"

jobs:

  # ────────────────────────────────────────────
  # JOB 1 — Lint, type-check, build
  # ────────────────────────────────────────────
  quality:
    name: Lint, TypeScript & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend/vitrine

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/vitrine/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint — ESLint
        run: npm run lint

      - name: Type check — tsc
        run: npm run type-check

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL_PROD }}
          NEXT_PUBLIC_CLOUDINARY_CLOUD: ${{ secrets.CLOUDINARY_CLOUD }}
          NEXT_PUBLIC_GTM_ID: ${{ secrets.GTM_ID }}
        run: npm run build

      - name: Check bundle size
        run: npx bundlewatch --config .bundlewatchrc.json

  # ────────────────────────────────────────────
  # JOB 2 — Security scan
  # ────────────────────────────────────────────
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: quality
    defaults:
      run:
        working-directory: ./frontend/vitrine

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/vitrine/package-lock.json

      - run: npm ci
      - name: npm audit
        run: npm audit --audit-level=high

  # ────────────────────────────────────────────
  # JOB 3 — Deploy Preview (per PR)
  # Vercel auto-generates a preview URL
  # ────────────────────────────────────────────
  deploy-preview:
    name: Deploy Preview → Vercel
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.event_name == 'pull_request'
    environment: preview

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy Preview
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_VITRINE }}
        run: |
          cd frontend/vitrine
          PREVIEW_URL=$(vercel deploy \
            --token=$VERCEL_TOKEN \
            --env NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }} \
            --env NEXT_PUBLIC_CLOUDINARY_CLOUD=${{ secrets.CLOUDINARY_CLOUD }} \
            --env NEXT_PUBLIC_GTM_ID=${{ secrets.GTM_ID }} \
            2>&1 | tail -1)
          echo "preview_url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          echo "Preview URL: $PREVIEW_URL"

      - name: Comment PR with preview URL
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '🌐 **Vitrine Preview**: ${{ steps.deploy.outputs.preview_url }}'
            })

      - name: Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: ${{ steps.deploy.outputs.preview_url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          budgetPath: ./frontend/vitrine/.lighthouserc.json

  # ────────────────────────────────────────────
  # JOB 4 — Deploy Production (auto on main)
  # ────────────────────────────────────────────
  deploy-production:
    name: Deploy Production → Vercel
    runs-on: ubuntu-latest
    needs: [quality, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Production
        id: deploy
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID_VITRINE }}
        run: |
          cd frontend/vitrine
          PROD_URL=$(vercel deploy --prod \
            --token=$VERCEL_TOKEN \
            --env NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL_PROD }} \
            --env NEXT_PUBLIC_CLOUDINARY_CLOUD=${{ secrets.CLOUDINARY_CLOUD }} \
            --env NEXT_PUBLIC_GTM_ID=${{ secrets.GTM_ID }} \
            2>&1 | tail -1)
          echo "prod_url=$PROD_URL" >> $GITHUB_OUTPUT

      - name: Purge Cloudflare cache
        run: |
          curl -X POST "https://api.cloudflare.com/client/v4/zones/${{ secrets.CF_ZONE_ID }}/purge_cache" \
            -H "Authorization: Bearer ${{ secrets.CF_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data '{"purge_everything":true}'

      - name: Ping sitemap
        run: |
          curl "https://www.google.com/ping?sitemap=https://bmg.tn/sitemap.xml"
          curl "https://www.bing.com/ping?sitemap=https://bmg.tn/sitemap.xml"

      - name: Notify Slack — vitrine deploy
        if: always()
        uses: slackapi/slack-github-action@v1
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🌐' || '🔴' }} *Vitrine deployed* → ${{ steps.deploy.outputs.prod_url }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ────────────────────────────────────────────
  # JOB 5 — Post-deploy Core Web Vitals
  # ────────────────────────────────────────────
  core-web-vitals:
    name: Core Web Vitals Check
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Lighthouse on production
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: https://bmg.tn
          uploadArtifacts: true
          budgetPath: ./frontend/vitrine/.lighthouserc.json