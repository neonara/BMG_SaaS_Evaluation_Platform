# BMG Redis configuration
# ──────────────────────────────────────────
requirepass your-redis-password-here

# Persistence — AOF for durability (JWT blacklist must survive restart)
appendonly yes
appendfsync everysec

# Max memory — set to ~80% of available RAM on the VPS
# maxmemory 512mb
# maxmemory-policy allkeys-lru

# Separate databases by logical purpose
# DB 0 — application cache (django-redis default)
# DB 1 — Celery result backend
# DB 2 — Django sessions

# Slow log — flag queries > 10ms
slowlog-log-slower-than 10000

# Disable KEYS command in production (use SCAN instead)
# rename-command KEYS ""
