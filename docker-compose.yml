# ============================================================
# BMG Platform — docker-compose.yml  v4.3
# ============================================================

networks:
  frontend_net:
    driver: bridge
  backend_net:
    driver: bridge
  data_net:
    driver: bridge
    internal: true

volumes:
  pg_data:
  redis_data:
  rabbitmq_data:
  static_files:
  next_cache:
  portainer_data:
  gotenberg_tmp:
  selenium_tmp:

services:

  django_api:
    build:
      context: ./bmg_backend
      dockerfile: Dockerfile
      target: production
    container_name: bmg_django
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - static_files:/app/staticfiles
    env_file:
      - .env.prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    networks:
      - frontend_net
      - backend_net
      - data_net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  celery_worker:
    build:
      context: ./bmg_backend
      dockerfile: Dockerfile
      target: production
    container_name: bmg_celery_worker
    restart: unless-stopped
    volumes:
      - gotenberg_tmp:/tmp/gotenberg
    env_file:
      - .env.prod
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - backend_net
      - data_net
    entrypoint: []
    command: >
      celery -A config worker
        --loglevel=info
        --concurrency=4
        --queues=default,scoring,pdf,email,notif
        --hostname=worker@%h

  celery_beat:
    build:
      context: ./bmg_backend
      dockerfile: Dockerfile
      target: production
    container_name: bmg_celery_beat
    restart: unless-stopped
    env_file:
      - .env.prod
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend_net
      - data_net
    entrypoint: []
    command: >
      celery -A config beat
        --loglevel=info
        --scheduler django_celery_beat.schedulers:DatabaseScheduler
        --pidfile=/tmp/celerybeat.pid

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: bmg_rabbitmq
    restart: unless-stopped
    expose:
      - "5672"
    ports:
      - "127.0.0.1:15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD}
      - RABBITMQ_DEFAULT_VHOST=bmg
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 20s
      timeout: 10s
      retries: 5

  gotenberg:
    image: gotenberg/gotenberg:8
    container_name: bmg_gotenberg
    restart: unless-stopped
    expose:
      - "3001"
    volumes:
      - gotenberg_tmp:/tmp/gotenberg
    networks:
      - backend_net
    command:
      gotenberg
        --api-port=3001
        --api-timeout=30s
        --chromium-allow-list=.*
        --log-level=warn

  selenium_grid:
    image: selenium/standalone-chrome:4.20
    container_name: bmg_selenium
    restart: unless-stopped
    expose:
      - "4444"
    volumes:
      - selenium_tmp:/tmp/selenium
      - /dev/shm:/dev/shm
    environment:
      - SE_NODE_MAX_SESSIONS=2
      - SE_NODE_OVERRIDE_MAX_SESSIONS=true
    networks:
      - backend_net
    shm_size: "2gb"

  postgres:
    image: postgres:16-alpine
    container_name: bmg_postgres
    restart: unless-stopped
    expose:
      - "5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
      - ./postgres/backups:/backups
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - data_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: bmg_redis
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/etc/redis/redis.conf:ro
    command: redis-server /etc/redis/redis.conf
    networks:
      - data_net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  portainer:
    image: portainer/portainer-ce:latest
    container_name: bmg_portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:8000"
    volumes:
      - portainer_data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - frontend_net
